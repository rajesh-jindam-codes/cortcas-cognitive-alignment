version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: cortcas-db
    restart: always
    environment:
      POSTGRES_DB: cortcas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1803"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cortcas"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cortcas-cache
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cortcas-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:1803@db:5432/cortcas
      - SYNC_DATABASE_URL=postgresql://postgres:1803@db:5432/cortcas
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=b9148d5fe52a2ef49057b3bf951d8b9487c6999a0937a07530c33a201c107147
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - REFRESH_TOKEN_EXPIRE_MINUTES=10080
      - PROJECT_NAME=CORTCAS
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend-stub:
    image: nginx:alpine
    container_name: cortcas-frontend
    restart: always
    ports:
      - "80:80"
    # Simple Nginx configuration stub for dashboard assets mapping
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
